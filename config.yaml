mqtt:
  host: !env MQTT_HOST
  port: !env MQTT_PORT
  username: !env MQTT_USERNAME
  password: !env MQTT_PASSWORD

location:
  latitude: !env PLANT_LATITUDE
  longitude: !env PLANT_LONGITUDE
  timezone: !env PLANT_TIMEZONE

batteries:
  - model: "noah2000"
    serial: !env BATTERY1_SN
    panels:
      - tilt: 45
        azimuth: 180
        area: 1.9981
        efficiency: 0.22
      - tilt: 45
        azimuth: 180
        area: 1.9981
        efficiency: 0.22
      - tilt: 45
        azimuth: 180
        area: 1.9981
        efficiency: 0.22
      - tilt: 45
        azimuth: 180
        area: 1.9981
        efficiency: 0.22

    n_batteries_stacked: 2
    use_smoothing: true

powermeter:
  topic: "tele/tasmota_799C3C/SENSOR"
  filter:
    dkeys:
      - "ENERGY"
      - "Power"
    dtype: "float"
    scale: 1.0
  use_smoothing: true
  update_interval: 10

inverter:
  model: "DeyeSunM160G4"
  topic: "deye"

loop:
  update_interval: 60
  power:
    max_power: 600
    min_power: 80
    control_threshold_W: 50
    offset: -10.0
  battery:
    full_threshold: 0.95
