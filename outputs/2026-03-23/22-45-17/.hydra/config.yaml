mqtt:
  _target_: ctrlsolar.io.Mqtt
  host: homeassistant.local
  port: 1883
  username: null
  password: null
forecast:
  _target_: ctrlsolar.panels.OpenMeteoForecast
  latitude: 42.46903090913205
  longitude: -71.35063628495487
  timezone: America/New_York
panels:
- _target_: ctrlsolar.panels.GenericPanel
  _partial_: true
  tilt: 45
  azimuth: 180
  area: 1.9981
  efficiency: 0.22
powermeter:
  _target_: ctrlsolar.io.MqttSensor
  _partial_: true
  topic: tele/tasmota_799C3C/SENSOR
  filter:
    _target_: ctrlsolar.functions.filter_dict_with_keys
    _partial_: true
    dkeys:
    - ENERGY
    - Power
    dtype: float
    scale: 1.0
  smoothing:
    kind: exponential
    source_interval: 10
inverter:
  _target_: ctrlsolar.inverter.DeyeSunM160G4
  _partial_: true
  topic: deye
  batteries:
  - _target_: ctrlsolar.battery.Noah2000
    _partial_: true
    serial: 0PVPH6ZR23QT00D9
    stack_count: 2
    use_smoothing: true
controllers:
- _target_: ctrlsolar.controller.ReduceConsumption
  max_power: ???
  min_power: ???
  control_threshold_W: ???
  offset: ???
- _target_: ctrlsolar.controller.ProductionForecast
  panels: ${panels}
  forecast: ${forecast}
  energy_today:
    _target_: ctrlsolar.io.MqttSensor
    _partial_: true
    topic: deye/day_energy
loop:
  update_interval: 60
